var currentQ = -1, answers = [], locked = false;
var content = document.getElementById('content');
var header = document.getElementById('header');

function fadeOut(cb){content.classList.remove('fade-in');content.classList.add('fade-out');setTimeout(cb,300)}
function fadeIn(){content.classList.remove('fade-out');content.classList.add('fade-in')}

function showWelcome(){
  header.classList.remove('compact');
  content.innerHTML =
    '<div class="welcome">' +
      '<img class="logo-welcome" src="data:image/png;base64,' + LOGO + '" alt="Ubik Asolo">' +
      '<h1>Quale libro<br>ti sta cercando?</h1>' +
      '<p>12 domande per scoprire la tua prossima lettura.<br>Non pensarci troppo \u2014 il tuo istinto sa gi\u00e0 la risposta.</p>' +
      '<button class="btn-start" onclick="startQuiz()">Inizia</button>' +
    '</div>';
  fadeIn();
}
function startQuiz(){fadeOut(function(){currentQ=0;answers=[];locked=false;showQuestion()})}
function showQuestion(){
  header.classList.add('compact');
  var q=QS[currentQ],pct=((currentQ+1)/QS.length*100).toFixed(0),L=['A','B','C','D','E'];
  var h='<div class="progress-row"><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div><span class="progress-count">'+(currentQ+1)+'/'+QS.length+'</span></div><h2 class="question-title">'+q.q+'</h2><div class="options">';
  for(var i=0;i<q.opts.length;i++) h+='<button class="option-btn" onclick="pick('+i+')"><span class="option-circle">'+L[i]+'</span><span>'+q.opts[i].t+'</span></button>';
  h+='</div>';content.innerHTML=h;fadeIn()
}
function pick(idx){
  if(locked)return;locked=true;
  var btns=document.querySelectorAll('.option-btn');
  for(var i=0;i<btns.length;i++){btns[i].classList.add('disabled');if(i===idx){btns[i].classList.add('selected');btns[i].querySelector('.option-circle').innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#A01A21" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'}else{btns[i].classList.add('dimmed')}}
  answers.push(QS[currentQ].opts[idx].s);
  setTimeout(function(){fadeOut(function(){currentQ++;locked=false;if(currentQ<QS.length)showQuestion();else showResult()})},400)
}
function showResult(){
  header.classList.add('compact');
  var sc={};var ks=Object.keys(BOOKS);for(var k=0;k<ks.length;k++)sc[ks[k]]=0;
  for(var a=0;a<answers.length;a++){var ans=answers[a];var ak=Object.keys(ans);for(var j=0;j<ak.length;j++)sc[ak[j]]=(sc[ak[j]]||0)+ans[ak[j]]}
  var sorted=Object.keys(sc).sort(function(a,b){return sc[b]-sc[a]});
  var bk=BOOKS[sorted[0]],rn=BOOKS[sorted[1]],show=rn&&rn.t!==bk.t;
  var h='<div class="result"><img class="logo-result" src="data:image/png;base64,'+LOGO+'" alt="Ubik Asolo"><div class="result-tag">Il tuo prossimo libro</div><div class="result-card"><div class="corner-tl"></div><div class="corner-br"></div><h2 class="result-title">'+bk.t+'</h2><p class="result-author">'+bk.a+'</p><div class="result-divider"></div><p class="result-reason">'+bk.m+'</p></div>';
